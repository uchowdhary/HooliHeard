apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hooli-heard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U hooli -d hooliheard; do
                echo "Waiting for postgres..."
                sleep 2
              done
      containers:
        - name: backend
          image: ghcr.io/uchowdhary/hooli-heard-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hooli-heard-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: hooli-heard
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
