services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hooliheard
      POSTGRES_USER: hooli
      POSTGRES_PASSWORD: hooli
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hooli -d hooliheard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hooli:hooli@db:5432/hooliheard
    volumes:
      - ./data:/data

  seed:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hooli:hooli@db:5432/hooliheard
    volumes:
      - ./scripts:/scripts
      - ./data:/data
    command: python3 /scripts/seed_db.py
    profiles:
      - seed

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
