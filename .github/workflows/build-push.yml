name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/rsuguiura-crwv/hooli-heard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push seed
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.seed
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-seed:latest
            ${{ env.IMAGE_PREFIX }}-seed:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
