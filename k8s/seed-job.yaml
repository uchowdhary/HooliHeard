apiVersion: batch/v1
kind: Job
metadata:
  name: seed-db
  namespace: hooli-heard
spec:
  backoffLimit: 3
  template:
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U hooli -d hooliheard; do
                echo "Waiting for postgres..."
                sleep 2
              done
      containers:
        - name: seed
          image: ghcr.io/uchowdhary/hooli-heard-seed:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hooli-heard-secret
                  key: DATABASE_URL
      restartPolicy: Never
